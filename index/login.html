<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | ihsancelik.com IT Service Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="auth-body" data-page="login">
  <div class="background-gradient"></div>

  <div class="language-toggle">
    <button data-lang="en" class="lang-btn active">EN</button>
    <button data-lang="tr" class="lang-btn">TR</button>
  </div>

  <div class="auth-container glass-card">
    <div class="auth-logo">
      <img src="assets/images/logo.svg" alt="ihsancelik.com Logo" />
      <h1 data-i18n="login_title">ihsancelik.com IT Service Portal</h1>
      <p class="subtitle" data-i18n="login_subtitle">
        Secure access to your managed IT services
      </p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="email" data-i18n="login_email_label">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required />
      </div>

      <div class="form-group">
        <label for="password" data-i18n="login_password_label">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="4" />
      </div>

      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" id="rememberMe" />
          <span data-i18n="login_remember">Remember me</span>
        </label>
        <a href="#" class="link-muted" data-i18n="login_forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary btn-full" data-i18n="login_button">
        Login
      </button>

      <p class="form-helper" data-i18n="login_helper">
        Demo: use any email and password to continue. This is not a production login.
      </p>
    </form>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
