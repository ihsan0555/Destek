<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ihsancelik.com IT Portal</title>
  <meta name="description" content="Secure login to ihsancelik.com IT Support Portal. Manage your support tickets and IT devices."/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg"/>
</head>
<body>
<div class="bg-mesh"></div>

<!-- Animated dots background -->
<div class="login-bg-dots" aria-hidden="true">
  <svg style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.3" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="1" fill="rgba(37,99,235,0.4)"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dots)"/>
  </svg>
</div>

<div class="login-page">
  <div class="login-card animate-fade-up">

    <!-- Language Switcher -->
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="topbar-lang-btn" onclick="toggleLang()" id="lang-toggle">🇹🇷 Türkçe</button>
    </div>

    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/images/logo.svg" alt="ihsancelik.com Logo" width="64" height="64"/>
      <div class="login-logo-name">ihsancelik.com</div>
      <div class="login-logo-sub" data-i18n="portal_sub">IT Service Portal</div>
    </div>

    <!-- Welcome Text -->
    <h1 class="login-title" data-i18n="welcome_back">Welcome Back</h1>
    <p class="login-subtitle" data-i18n="sign_in_desc">Sign in to access your IT support dashboard</p>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="email" data-i18n="email_label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" class="form-control" placeholder="you@company.com" autocomplete="email" required/>
        </div>
        <span class="form-error hidden" id="email-error" data-i18n="email_error">Please enter a valid email address</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password" data-i18n="password_label">Password</label>
        <div class="input-icon-wrap" style="position:relative">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer" id="pwd-toggle">👁️</button>
        </div>
        <span class="form-error hidden" id="pwd-error" data-i18n="pwd_error">Password must be at least 6 characters</span>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <label class="checkbox-wrap" style="cursor:pointer">
          <input type="checkbox" id="remember-me"/>
          <span class="checkbox-custom"></span>
          <span style="font-size:0.85rem;color:var(--text-secondary)" data-i18n="remember_me">Remember me</span>
        </label>
        <a href="#" style="font-size:0.8rem;color:var(--accent)" data-i18n="forgot_pwd">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn">
        <span id="login-btn-text" data-i18n="sign_in">Sign In</span>
        <span id="login-spin" class="hidden" style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block"></span>
      </button>
    </form>

    <div class="login-divider"><span data-i18n="demo_hint">Demo Credentials</span></div>

    <!-- Demo hint -->
    <div class="glass-card-sm" style="padding:14px 16px;font-size:0.8rem;color:var(--text-muted)">
      <strong style="color:var(--text-primary)">📧 Email:</strong> demo@ihsancelik.com<br/>
      <strong style="color:var(--text-primary)">🔑 <span data-i18n="password_label">Password</span>:</strong> demo1234
    </div>

    <div class="login-footer">
      <span data-i18n="no_account">Don't have an account?</span>
      <a href="#" style="margin-left:6px" data-i18n="contact_us">Contact us</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="assets/js/app.js"></script>
<script>
  // Pre-fill demo credentials for convenience
  document.getElementById('email').value = 'demo@ihsancelik.com';
</script>
</body>
</html>
