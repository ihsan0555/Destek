<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ticket Detail | ihsancelik.com IT Service Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="ticket-detail">
  <div class="background-gradient"></div>

  <div class="app-shell">
    <aside class="sidebar glass-card">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo-inline">
          <img src="assets/images/logo.svg" alt="ihsancelik.com Logo" />
          <span>ihsancelik.com</span>
        </a>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" data-i18n="nav_dashboard">
          Dashboard
        </a>
        <a href="tickets.html" class="nav-item active" data-i18n="nav_tickets">
          My Tickets
        </a>
        <a href="tickets.html#create" class="nav-item" data-i18n="nav_create_ticket">
          Create Ticket
        </a>
        <a href="devices.html" class="nav-item" data-i18n="nav_devices">
          My Devices
        </a>
        <a href="kb.html" class="nav-item" data-i18n="nav_kb">
          Knowledge Base
        </a>
        <a href="#" class="nav-item" data-i18n="nav_profile">
          Profile
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-ghost" id="logoutBtn" data-i18n="nav_logout">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
          <h1 data-i18n="ticket_detail_title">Ticket Detail</h1>
        </div>
        <div class="topbar-right">
          <div class="language-toggle small">
            <button data-lang="en" class="lang-btn active">EN</button>
            <button data-lang="tr" class="lang-btn">TR</button>
          </div>
        </div>
      </header>

      <section class="content-grid ticket-detail-layout">
        <div class="card glass-card span-2">
          <div class="card-header">
            <div>
              <h2 id="ticketDetailTitle">#T-0000</h2>
              <p class="muted" id="ticketDetailMeta">
                <!-- Filled by JS -->
              </p>
            </div>
            <div class="status-badge-group">
              <label for="ticketStatusSelect" data-i18n="ticket_detail_status_label">Status</label>
              <select id="ticketStatusSelect">
                <option value="Open" data-i18n="status_open">Open</option>
                <option value="In Progress" data-i18n="status_in_progress">In Progress</option>
                <option value="Waiting Customer" data-i18n="status_waiting">Waiting Customer</option>
                <option value="Resolved" data-i18n="status_resolved">Resolved</option>
              </select>
            </div>
          </div>

          <div class="card-body ticket-thread">
            <div id="ticketConversation">
              <!-- Conversation messages filled by JS -->
            </div>
          </div>

          <div class="card-footer">
            <form id="ticketReplyForm" class="reply-form">
              <textarea id="ticketReplyText" rows="3" placeholder="Type your reply..." required></textarea>
              <div class="reply-actions">
                <button type="submit" class="btn-primary" data-i18n="ticket_reply_submit">
                  Send Reply
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="card glass-card">
          <div class="card-header">
            <h2 data-i18n="ticket_detail_info_title">Ticket Info</h2>
          </div>
          <div class="card-body info-list">
            <div>
              <span data-i18n="ticket_field_priority">Priority</span>
              <strong id="ticketInfoPriority">-</strong>
            </div>
            <div>
              <span data-i18n="ticket_field_device">Device</span>
              <strong id="ticketInfoDevice">-</strong>
            </div>
            <div>
              <span data-i18n="ticket_detail_created">Created</span>
              <strong id="ticketInfoCreated">-</strong>
            </div>
            <div>
              <span data-i18n="ticket_detail_updated">Last Updated</span>
              <strong id="ticketInfoUpdated">-</strong>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
