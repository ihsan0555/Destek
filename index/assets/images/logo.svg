<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="100,10 175,52 175,148 100,190 25,148 25,52"
           fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="2"/>
  <!-- Shield shape -->
  <path d="M100 30 L155 60 L155 105 Q155 148 100 170 Q45 148 45 105 L45 60 Z"
        fill="url(#grad2)" opacity="0.2"/>
  <path d="M100 38 L148 64 L148 105 Q148 142 100 162 Q52 142 52 105 L52 64 Z"
        fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="1"/>
  <!-- Monitor icon inside -->
  <rect x="72" y="75" width="56" height="38" rx="4"
        fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
  <rect x="78" y="81" width="44" height="26" rx="2"
        fill="url(#grad1)" opacity="0.3"/>
  <!-- Screen glow -->
  <circle cx="100" cy="94" r="8" fill="url(#grad1)" opacity="0.6"/>
  <!-- Stand -->
  <line x1="91" y1="113" x2="109" y2="113" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="113" x2="100" y2="120" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="87" y1="120" x2="113" y2="120" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wifi signals -->
  <path d="M88 68 Q100 60 112 68" stroke="url(#grad1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M82 63 Q100 50 118 63" stroke="url(#grad1)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
