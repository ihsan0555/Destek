<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ihsancelik.com — IT Destek</title>

<style>
/* ... (Senin paylaştığın tüm CSS kodları burada aynen durmalı) ... */
:root{--blue:#0078d4;--blue-dk:#005a9e;--bg:#f3f2f1;--br:#edebe9;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg)}
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.ld-bar{width:180px;height:3px;background:var(--br);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--blue);animation:ldf 1.6s ease-in-out infinite}
@keyframes ldf{0%{width:0;margin-left:0}50%{width:75%;margin-left:0}100%{width:0;margin-left:100%}}
#auth-wrap, #app { display: none; } /* Başlangıçta gizli */
</style>
</head>
<body>

<div id="loader">
  <div style="font-size:48px;">🛡️</div>
  <div style="font-size:14px;">Bağlanıyor…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<div id="auth-wrap">
    <div style="color:white; text-align:center; padding:50px;">
        <h2>IT Destek Giriş</h2>
        <p>Lütfen bekleyiniz...</p>
    </div>
</div>

<div id="app">
    <div id="main-content">
        <h1>Dashboard Hazır</h1>
        <button onclick="auth.signOut()">Çıkış Yap</button>
    </div>
</div>

<script type="module">
  // 1. Firebase Modüllerini İçe Aktar (v10)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 2. Senin Gönderdiğin Yapılandırma
  const firebaseConfig = {
    apiKey: "AIzaSyBrvXjyki5TOeqW_kp88LD9E5kPv2dMvTg",
    authDomain: "ihsancelik-destek.firebaseapp.com",
    projectId: "ihsancelik-destek",
    storageBucket: "ihsancelik-destek.firebasestorage.app",
    messagingSenderId: "735030581861",
    appId: "1:735030581861:web:0658649dbacb68e70b848c"
  };

  // Başlat
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Global erişim için (isteğe bağlı)
  window.auth = auth;

  // Arayüz Elementleri
  const loader = document.getElementById('loader');
  const authWrap = document.getElementById('auth-wrap');
  const appWrap = document.getElementById('app');

  // 3. Oturum Takibi (En Kritik Kısım)
  onAuthStateChanged(auth, async (user) => {
    console.log("Oturum durumu kontrol ediliyor...");
    
    try {
      if (user) {
        // KULLANICI GİRİŞ YAPMIŞ
        console.log("Giriş yapıldı:", user.email);
        
        // Kullanıcı verilerini Firestore'dan çek (Örn: Yetki kontrolü için)
        const userDoc = await getDoc(doc(db, "users", user.uid));
        
        // Uygulamayı göster
        loader.style.opacity = '0';
        setTimeout(() => { 
            loader.style.display = 'none';
            authWrap.style.display = 'none';
            appWrap.style.display = 'block'; 
        }, 300);

      } else {
        // KULLANICI GİRİŞ YAPMAMIŞ
        console.log("Oturum yok, login ekranına yönlendiriliyor.");
        loader.style.display = 'none';
        appWrap.style.display = 'none';
        authWrap.style.display = 'flex';
      }
    } catch (error) {
      console.error("Hata oluştu:", error);
      // Hata olsa bile loader'ı kapat ki ekran donmasın
      loader.style.display = 'none';
      authWrap.style.display = 'flex';
    }
  });

  // Örnek Login Fonksiyonu (Düğmene bağlamak için)
  window.doLogin = async () => {
      const email = document.getElementById('l-em').value;
      const pass = document.getElementById('l-pw').value;
      try {
          await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) {
          alert("Hata: " + err.message);
      }
  };

</script>
</body>
</html>
