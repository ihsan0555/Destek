<script type="module">
    // Firebase Modüllerini İçe Aktar
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 1. Firebase Yapılandırması (Kendi bilgilerinle değiştir)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase Başlat
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Yükleme ekranını kapatan yardımcı fonksiyon
    function stopLoading() {
        const loadingScreen = document.getElementById('loading-screen'); // ID'ni kontrol et
        if (loadingScreen) {
            loadingScreen.style.display = 'none';
        }
        // Eğer Redux kullanıyorsan:
        // dispatch({ type: 'SET_BLOCKING', payload: false });
    }

    // 2. Ana Oturum ve Veri Akışı
    onAuthStateChanged(auth, async (user) => {
        console.log("Oturum durumu kontrol ediliyor...");
        
        try {
            if (user) {
                console.log("Kullanıcı giriş yapmış:", user.uid);
                
                // Firestore'dan kullanıcı verilerini çek
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    console.log("Veri başarıyla çekildi:", userData);
                    // State güncelleme işlemleri buraya
                    // dispatch({ type: 'SET_STORAGE_DATA', payload: userData });
                } else {
                    console.warn("Kullanıcı dökümanı bulunamadı, yeni oluşturuluyor...");
                    const defaultData = { locale: 'tr', theme: 'light', firstLogin: new Date() };
                    await setDoc(userDocRef, defaultData);
                }
            } else {
                console.log("Kullanıcı giriş yapmamış.");
                // Giriş sayfasına yönlendirme veya varsayılan dil ayarı
            }
        } catch (error) {
            console.error("Kritik Hata:", error.message);
            // Hata durumunda kullanıcıya bilgi verilebilir
            if (error.code === 'permission-denied') {
                alert("Veritabanına erişim yetkiniz yok. Lütfen giriş yapın.");
            }
        } finally {
            // NE OLURSA OLSUN Yükleme ekranını kapat! 
            // Bu satır uygulamanın açılmasını sağlayan en kritik yerdir.
            stopLoading();
            console.log("Yükleme işlemi tamamlandı.");
        }
    });

</script>

<div id="loading-screen">
    <p>Bağlanıyor...</p>
    </div>
