<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ihsancelik.com — IT Destek</title>

<style>
:root{
  --blue:#0078d4;--blue-dk:#005a9e;--blue-lt:#deecf9;--blue-md:#c7e0f4;
  --green:#107c10;--green-lt:#dff6dd;--red:#d13438;--red-lt:#fde7e9;
  --orange:#ca5010;--orange-lt:#fdf3d0;--purple:#8764b8;--purple-lt:#f4f0fb;
  --bg:#f3f2f1;--white:#fff;
  --s-bg:#1b1b2e;--s-text:rgba(255,255,255,.85);--s-muted:rgba(255,255,255,.4);
  --s-hover:rgba(255,255,255,.07);--s-active:rgba(0,120,212,.22);
  --t1:#323130;--t2:#605e5c;--t3:#a19f9d;
  --br:#edebe9;--br-dk:#c8c6c4;
  --sh1:0 1.6px 3.6px rgba(0,0,0,.13),0 .3px .9px rgba(0,0,0,.1);
  --sh2:0 3.2px 7.2px rgba(0,0,0,.13),0 .6px 1.8px rgba(0,0,0,.1);
  --sh3:0 6.4px 14.4px rgba(0,0,0,.13),0 1.2px 3.6px rgba(0,0,0,.1);
  --r:4px;--rl:8px;--sw:240px;--hh:48px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
}
/* ... (Geri kalan tüm CSS kodların burada aynen devam ediyor) ... */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
.ld-icon{font-size:48px;animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
.ld-txt{font-size:14px;color:var(--t2)}
.ld-bar{width:180px;height:3px;background:var(--br);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--blue);animation:ldf 1.6s ease-in-out infinite}
@keyframes ldf{0%{width:0;margin-left:0}50%{width:75%;margin-left:0}100%{width:0;margin-left:100%}}
#auth-wrap{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1b1b2e,#16213e 55%,#0f3460)}
.a-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.a-brand-icon{width:44px;height:44px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(0,120,212,.5)}
.a-brand-name{font-size:20px;font-weight:300;color:#fff}.a-brand-name b{font-weight:700;color:#4da6ff}
.a-card{background:#fff;border-radius:var(--rl);width:min(400px,100%);box-shadow:0 16px 48px rgba(0,0,0,.45);overflow:hidden}
.a-head{padding:24px 24px 0}.a-title{font-size:19px;font-weight:700;color:var(--t1);margin-bottom:3px}.a-sub{font-size:13px;color:var(--t2)}
.a-form{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px}
.a-err{font-size:13px;color:var(--red);background:var(--red-lt);padding:10px 12px;border-radius:var(--r);border-left:3px solid var(--red);display:none}
.a-err.on{display:block}
.fi{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.04em;text-transform:uppercase}
.inp{height:38px;padding:0 12px;border:1px solid var(--br-dk);border-radius:var(--r);font-family:var(--font);font-size:14px;color:var(--t1);outline:none;transition:.15s;background:#fff;width:100%}
.btn-p{background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 18px;border-radius:var(--r);font-weight:600;cursor:pointer;border:none}
#app{display:none;min-height:100vh}
/* (Buraya senin gönderdiğin geri kalan Sidebar, Header, Table vs. CSS'lerin gelecek) */
</style>
</head>
<body>

<div id="loader">
  <div class="ld-icon">🛡️</div>
  <div class="ld-txt">Bağlanıyor…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<div id="auth-wrap">
  <div id="v-login">
    <div class="a-brand"><div class="a-brand-icon">🛡️</div><div class="a-brand-name"><b>ihsancelik</b>.com IT</div></div>
    <div class="a-card">
      <div class="a-head"><div class="a-title">Giriş Yap</div><div class="a-sub">IT destek portalına hoşgeldiniz</div></div>
      <div class="a-form">
        <div class="a-err" id="l-err"></div>
        <div class="fi"><label class="fl">E-POSTA</label><input class="inp" id="l-em" type="email" placeholder="ornek@sirket.com"></div>
        <div class="fi"><label class="fl">ŞİFRE</label><input class="inp" id="l-pw" type="password" placeholder="••••••••"></div>
        <button class="btn-p" style="width:100%;height:40px" id="l-btn">Giriş Yap →</button>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <header class="hdr"><div class="hdr-title">Dashboard</div></header>
  <main class="main"><div class="pg on"><h1>Hoş Geldiniz</h1><p>Sistem aktif.</p></div></main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrvXjyki5TOeqW_kp88LD9E5kPv2dMvTg",
    authDomain: "ihsancelik-destek.firebaseapp.com",
    projectId: "ihsancelik-destek",
    storageBucket: "ihsancelik-destek.firebasestorage.app",
    messagingSenderId: "735030581861",
    appId: "1:735030581861:web:0658649dbacb68e70b848c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loader = document.getElementById('loader');
  const authWrap = document.getElementById('auth-wrap');
  const appWrap = document.getElementById('app');

  // OTURUM KONTROLÜ
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // Giriş yapılmışsa ana uygulamayı göster
      loader.style.display = 'none';
      authWrap.style.display = 'none';
      appWrap.style.display = 'block';
    } else {
      // Giriş yoksa login ekranını göster
      loader.style.display = 'none';
      appWrap.style.display = 'none';
      authWrap.style.display = 'flex';
    }
  });

  // GİRİŞ BUTONU İŞLEVİ
  document.getElementById('l-btn').onclick = async () => {
    const em = document.getElementById('l-em').value;
    const pw = document.getElementById('l-pw').value;
    const err = document.getElementById('l-err');
    
    try {
      await signInWithEmailAndPassword(auth, em, pw);
    } catch (e) {
      err.textContent = "Hata: E-posta veya şifre yanlış.";
      err.classList.add('on');
    }
  };
</script>
</body>
</html>
