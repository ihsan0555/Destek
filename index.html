<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ihsancelik.com — IT Destek</title>

<style>
/* --- SENİN ORİJİNAL TASARIMIN (CSS) --- */
:root{
  --blue:#0078d4;--blue-dk:#005a9e;--blue-lt:#deecf9;--blue-md:#c7e0f4;
  --green:#107c10;--green-lt:#dff6dd;--red:#d13438;--red-lt:#fde7e9;
  --orange:#ca5010;--orange-lt:#fdf3d0;--purple:#8764b8;--purple-lt:#f4f0fb;
  --bg:#f3f2f1;--white:#fff;
  --s-bg:#1b1b2e;--s-text:rgba(255,255,255,.85);--s-muted:rgba(255,255,255,.4);
  --s-hover:rgba(255,255,255,.07);--s-active:rgba(0,120,212,.22);
  --t1:#323130;--t2:#605e5c;--t3:#a19f9d;
  --br:#edebe9;--br-dk:#c8c6c4;
  --sh1:0 1.6px 3.6px rgba(0,0,0,.13),0 .3px .9px rgba(0,0,0,.1);
  --sh2:0 3.2px 7.2px rgba(0,0,0,.13),0 .6px 1.8px rgba(0,0,0,.1);
  --sh3:0 6.4px 14.4px rgba(0,0,0,.13),0 1.2px 3.6px rgba(0,0,0,.1);
  --r:4px;--rl:8px;--sw:240px;--hh:48px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
.ld-icon{font-size:48px;animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
.ld-txt{font-size:14px;color:var(--t2)}
.ld-bar{width:180px;height:3px;background:var(--br);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--blue);animation:ldf 1.6s ease-in-out infinite}
@keyframes ldf{0%{width:0;margin-left:0}50%{width:75%;margin-left:0}100%{width:0;margin-left:100%}}

/* AUTH & APP GİZLEME */
#auth-wrap, #app { display: none; }

/* DİĞER CSSLERİN AYNI KALSIN (Kısalık için özetledim, senin dosyanın aynısıdır) */
#auth-wrap{position:fixed;inset:0;z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1b1b2e,#16213e 55%,#0f3460)}
.a-card{background:#fff;border-radius:var(--rl);width:min(400px,100%);box-shadow:0 16px 48px rgba(0,0,0,.45);overflow:hidden;padding:24px}
.fi{display:flex;flex-direction:column;gap:5px;margin-bottom:15px}
.inp{height:38px;padding:0 12px;border:1px solid var(--br-dk);border-radius:var(--r);outline:none;width:100%}
.btn-p{background:var(--blue);color:#fff;cursor:pointer;border:none;height:40px;width:100%;font-weight:700}
.a-err{font-size:13px;color:var(--red);background:var(--red-lt);padding:10px;border-radius:var(--r);display:none;margin-bottom:10px}
.a-err.on{display:block}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-icon">🛡️</div>
  <div class="ld-txt">Bağlanıyor…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<div id="auth-wrap">
  <div class="a-card">
    <h2 style="margin-bottom:10px">Giriş Yap</h2>
    <div class="a-err" id="l-err"></div>
    <div class="fi"><input class="inp" id="l-em" type="email" placeholder="E-posta"></div>
    <div class="fi"><input class="inp" id="l-pw" type="password" placeholder="Şifre"></div>
    <button class="btn-p" id="l-btn">Giriş Yap →</button>
  </div>
</div>

<div id="app">
  <div style="padding:40px; text-align:center">
    <h1>🛡️ Dashboard Aktif</h1>
    <p id="user-info" style="margin:20px 0"></p>
    <button class="btn-p" style="width:auto; padding:0 20px" id="logout-btn">Güvenli Çıkış</button>
  </div>
</div>

<script type="module">
  // 1. Firebase Modülleri
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 2. Senin Config Bilgilerin
  const firebaseConfig = {
    apiKey: "AIzaSyBrvXjyki5TOeqW_kp88LD9E5kPv2dMvTg",
    authDomain: "ihsancelik-destek.firebaseapp.com",
    projectId: "ihsancelik-destek",
    storageBucket: "ihsancelik-destek.firebasestorage.app",
    messagingSenderId: "735030581861",
    appId: "1:735030581861:web:0658649dbacb68e70b848c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Elementler
  const loader = document.getElementById('loader');
  const authWrap = document.getElementById('auth-wrap');
  const appWrap = document.getElementById('app');

  // 3. Oturum Kontrolü (Hata yönetimli)
  onAuthStateChanged(auth, async (user) => {
    try {
      if (user) {
        // Oturum var: Veriyi çek ve dashboardu aç
        const snap = await getDoc(doc(db, "users", user.uid));
        document.getElementById('user-info').textContent = "Kullanıcı: " + user.email;
        
        loader.style.display = 'none';
        authWrap.style.display = 'none';
        appWrap.style.display = 'block';
      } else {
        // Oturum yok: Giriş ekranını aç
        loader.style.display = 'none';
        appWrap.style.display = 'none';
        authWrap.style.display = 'flex';
      }
    } catch (err) {
      console.error("Hata:", err);
      loader.style.display = 'none';
      authWrap.style.display = 'flex';
    }
  });

  // 4. Giriş Yapma Fonksiyonu
  document.getElementById('l-btn').onclick = async () => {
    const em = document.getElementById('l-em').value;
    const pw = document.getElementById('l-pw').value;
    const err = document.getElementById('l-err');
    
    try {
      err.classList.remove('on');
      await signInWithEmailAndPassword(auth, em, pw);
    } catch (e) {
      err.textContent = "Giriş Hatası: Şifre veya e-posta yanlış.";
      err.classList.add('on');
    }
  };

  // 5. Çıkış Yapma
  document.getElementById('logout-btn').onclick = () => signOut(auth);

</script>
</body>
</html>
